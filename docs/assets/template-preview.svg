  <rect x="794" y="468" width="240" height="132" fill="white" stroke="#E7E5E4"/>
  <rect x="1060" y="468" width="240" height="132" fill="white" stroke="#E7E5E4"/>
  <text x="556" y="514" fill="#1C1917" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Projects</text>
  <text x="556" y="548" fill="#57534E" font-family="Arial, sans-serif" font-size="17">Card grid and detail</text>
  <text x="556" y="572" fill="#57534E" font-family="Arial, sans-serif" font-size="17">pages ready for swaps</text>
  <text x="822" y="514" fill="#1C1917" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Services</text>
  <text x="822" y="548" fill="#57534E" font-family="Arial, sans-serif" font-size="17">Simple offer section</text>
  <text x="822" y="572" fill="#57534E" font-family="Arial, sans-serif" font-size="17">without product bloat</text>
  <text x="1088" y="514" fill="#1C1917" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Metadata</text>
  <text x="1088" y="548" fill="#57534E" font-family="Arial, sans-serif" font-size="17">Sitemap, robots, OG,</text>
  <text x="1088" y="572" fill="#57534E" font-family="Arial, sans-serif" font-size="17">icons, manifest</text>
  <rect x="140" y="636" width="1160" height="138" fill="white" stroke="#E7E5E4"/>
  <text x="180" y="688" fill="#1C1917" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Publish as a reusable frontsite starter, then fill in the real public story.</text>
  <text x="180" y="730" fill="#57534E" font-family="Arial, sans-serif" font-size="22">Template productization first. Real content, art direction, and dynamic tools later.</text>
