  <text x="180" y="264" fill="#78716C" font-family="'SFMono-Regular', Menlo, monospace" font-size="14" letter-spacing="4">VOL.01</text>
  <text x="180" y="336" fill="#1C1917" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">A calm editorial shell for</text>
  <text x="180" y="410" fill="#1C1917" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">writing, projects, and services.</text>
  <text x="180" y="456" fill="#57534E" font-family="Arial, sans-serif" font-size="24">Next.js App Router template with local MDX collections, seeded content, and share-ready metadata routes.</text>
  <rect x="140" y="468" width="360" height="132" fill="#1C1917"/>
  <text x="172" y="518" fill="#F5F5F4" font-family="'SFMono-Regular', Menlo, monospace" font-size="14" letter-spacing="4">RECENT WRITING</text>
  <text x="172" y="558" fill="white" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Seed content still</text>
  <text x="172" y="594" fill="white" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">needs structure</text>
